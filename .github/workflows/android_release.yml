name: Android Release Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x FrontEnd/gradlew

      - name: Configure gradle.properties
        run: |
          # Use the secret if provided, otherwise keep the local value if it exists
          if [ ! -z "${{ secrets.BASE_URL }}" ]; then
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> FrontEnd/gradle.properties
          fi
          echo "android.useAndroidX=true" >> FrontEnd/gradle.properties
          echo "android.enableJetifier=true" >> FrontEnd/gradle.properties

      - name: Set Version Name
        id: version
        run: |
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Build APK
        run: |
          cd FrontEnd
          ./gradlew assembleDebug \
            -PVERSION_CODE=${{ github.run_number }} \
            -PVERSION_NAME=${{ env.VERSION_NAME }}

      - name: Rename APK
        run: |
          mv FrontEnd/app/build/outputs/apk/debug/app-debug.apk FrontEnd/app/build/outputs/apk/debug/XLMS-Admin-${{ env.VERSION_NAME }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XLMS-Admin-${{ env.VERSION_NAME }}
          path: FrontEnd/app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: v${{ env.VERSION_NAME }}
          draft: false
          prerelease: false
          files: FrontEnd/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
