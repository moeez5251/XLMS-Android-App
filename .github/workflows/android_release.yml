name: Android Release Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x FrontEnd/gradlew

      - name: Create gradle.properties
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL || 'http://localhost:3000' }}" > FrontEnd/gradle.properties

      - name: Set Version Name
        id: version
        run: |
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: |
          cd FrontEnd
          ./gradlew assembleRelease \
            -PVERSION_CODE=${{ github.run_number }} \
            -PVERSION_NAME=${{ env.VERSION_NAME }}

      - name: Rename APK
        run: |
          mv FrontEnd/app/build/outputs/apk/release/app-release-unsigned.apk FrontEnd/app/build/outputs/apk/release/xlms-admin-${{ env.VERSION_NAME }}.apk
        continue-on-error: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ env.VERSION_NAME }}
          path: FrontEnd/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Release v${{ env.VERSION_NAME }}
          draft: false
          prerelease: false
          files: FrontEnd/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
