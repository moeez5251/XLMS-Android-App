<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {

                    "on-secondary-fixed": "#121c2b",

                    "surface-container-low": "#f3f4f5",
                    "on-tertiary-fixed-variant": "#633f0f",

                    "error": "#ba1a1a",

                    "outline": "#74777f",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#4f2e00",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#555f70",
                    "on-primary-container": "#86a0cd",
                    "inverse-on-surface": "#f0f1f2",
                    "primary-container": "#1a365d",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#d9dadb",
                    "on-tertiary-fixed": "#2b1700",
                    "on-primary-fixed": "#001b3c",
                    "inverse-surface": "#2e3132",
                    "tertiary-fixed": "#ffddba",
                    "outline-variant": "#c4c6cf",
                    "surface-variant": "#e1e3e4",
                    "surface-container": "#edeeef",
                    "surface-bright": "#f8f9fa",
                    "on-surface-variant": "#43474e",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#bdc7db",
                    "on-surface": "#191c1d",

                    "surface": "#f8f9fa",
                    "on-primary-fixed-variant": "#2d476f",
                    "tertiary-fixed-dim": "#f2bc82",
                    "primary-fixed-dim": "#adc7f7",
                    "on-primary": "#ffffff",
                    "background": "#f8f9fa",
                    "surface-container-high": "#e7e8e9",
                    "error-container": "#ffdad6",
                    "secondary-container": "#d9e3f8",
                    "tertiary": "#321b00",
                    "on-secondary-container": "#5b6577"

            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",

            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .scholarly-gradient {
            background: linear-gradient(135deg, #002045 0%, #1a365d 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_12px_32px_-4px_rgba(25,28,29,0.06)] h-16 flex items-center px-6">
<div class="flex items-center w-full max-w-7xl mx-auto">
<button class="material-symbols-outlined text-[#1A365D] dark:text-blue-100 p-2 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 transition-transform duration-200 rounded-full" data-icon="arrow_back">arrow_back</button>
<h1 class="ml-4 font-['Manrope'] font-semibold text-lg tracking-tight text-[#1A365D] dark:text-blue-100">Notifications</h1>
</div>
</header>
<!-- Main Content: Empty State Canvas -->
<main class="flex-grow flex items-center justify-center px-6 pt-16 pb-24">
<div class="max-w-md w-full text-center">
<!-- Centralized Layout with Asymmetric Tonal Layering -->
<div class="relative inline-block mb-12">
<!-- Decorative Layered Background -->
<div class="absolute inset-0 bg-surface-container-low rounded-full scale-150 -z-10 blur-3xl opacity-50"></div>
<div class="w-32 h-32 bg-surface-container-lowest rounded-xl flex items-center justify-center mx-auto shadow-[0_12px_32px_-4px_rgba(25,28,29,0.06)] relative">
<span class="material-symbols-outlined text-[#1A365D] text-6xl opacity-20" data-icon="notifications_off">notifications_off</span>
<div class="absolute -bottom-2 -right-2 bg-surface-container-low p-3 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-[#1A365D]" data-icon="library_books">library_books</span>
</div>
</div>
</div>
<div class="space-y-4">
<h2 class="font-headline font-bold text-3xl tracking-tight text-primary">No Notifications</h2>
<p class="font-body text-on-surface-variant max-w-xs mx-auto text-lg leading-relaxed">
                    You're all caught up for now. Your scholarly updates will appear here as they arrive.
                </p>
</div>
<!-- Action Area / Curator's Tray Context -->
<div class="mt-12 flex justify-center gap-4">
<button class="scholarly-gradient text-white px-8 py-3 rounded-xl font-medium shadow-lg hover:opacity-90 active:scale-95 transition-all duration-200">
                    Refresh Feed
                </button>
<button class="bg-secondary-container text-on-secondary-container px-8 py-3 rounded-xl font-medium hover:bg-surface-container-high transition-colors active:scale-95">
                    Settings
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl z-50 rounded-t-2xl shadow-[0_-8px_24px_-4px_rgba(25,28,29,0.04)]">
<div class="flex items-center justify-around w-full max-w-2xl mx-auto">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-[#1A365D] dark:hover:text-blue-200 active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="library_books">library_books</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Collection</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-[#1A365D] dark:hover:text-blue-200 active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="search">search</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Catalog</span>
</a>
<!-- Active State: Account/Profile context often linked to notifications in systems -->
<a class="flex flex-col items-center justify-center bg-[#1A365D] text-white rounded-xl px-5 py-2 active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person" data-weight="fill" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Account</span>
</a>
</div>
</nav>
<!-- Decorative background image for the "Atelier" feel -->
<div class="fixed top-0 right-0 -z-20 w-1/3 h-full opacity-5 pointer-events-none">
<img class="w-full h-full object-cover" data-alt="Macro detail of high-quality cream colored textured paper with subtle fiber patterns and a soft shadow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCUg08JEWKD37Hsv5GCQsFKTOmpYE6rwE3sD_L5LqawXhi33oNK7GZoSM3hCWYIMWs9Ho7dq1TTCaLGykiQJr0Z9wT27yjXm2XPxmIXGTHTHGu30V1UNswccHSB5dhMQ6js6U7_Mn4JwZraIeNJqY6Pr2HjphOW3DIkRahv9vKPLR11_W-a47gYpFqnn_snzjUHaIPglqf5PyojW_k-pwdGInAOyzg1cwHtaS9hVvA5so1oO266ZQ0n9LG433ZdBd7FIoBpbd6OqY"/>
</div>
