<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Book | XLMS Library</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed": "#d6e3ff",
                      "secondary-container": "#d9e3f8",
                      "surface": "#f8f9fa",
                      "primary-fixed-dim": "#adc7f7",
                      "surface-container": "#edeeef",
                      "tertiary": "#321b00",
                      "outline-variant": "#c4c6cf",
                      "on-error-container": "#93000a",
                      "surface-variant": "#e1e3e4",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-container": "#5b6577",
                      "surface-container-high": "#e7e8e9",
                      "on-error": "#ffffff",
                      "on-primary-fixed": "#001b3c",
                      "surface-tint": "#455f88",
                      "surface-container-highest": "#e1e3e4",
                      "inverse-on-surface": "#f0f1f2",
                      "on-tertiary-fixed-variant": "#633f0f",
                      "tertiary-container": "#4f2e00",
                      "on-secondary-fixed": "#121c2b",
                      "inverse-surface": "#2e3132",
                      "on-tertiary": "#ffffff",
                      "on-background": "#191c1d",
                      "tertiary-fixed-dim": "#f2bc82",
                      "tertiary-fixed": "#ffddba",
                      "surface-container-low": "#f3f4f5",
                      "secondary": "#555f70",
                      "surface-bright": "#f8f9fa",
                      "on-tertiary-fixed": "#2b1700",
                      "on-secondary-fixed-variant": "#3e4758",
                      "on-primary": "#ffffff",
                      "inverse-primary": "#adc7f7",
                      "background": "#f8f9fa",
                      "primary": "#002045",
                      "on-secondary": "#ffffff",
                      "outline": "#74777f",
                      "on-primary-container": "#86a0cd",
                      "surface-dim": "#d9dadb",
                      "secondary-fixed": "#d9e3f8",
                      "secondary-fixed-dim": "#bdc7db",
                      "on-surface-variant": "#43474e",
                      "error-container": "#ffdad6",
                      "on-tertiary-container": "#c6955e",
                      "on-primary-fixed-variant": "#2d476f",
                      "primary-container": "#1a365d",
                      "on-surface": "#191c1d",
                      "error": "#ba1a1a"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scholarly-shadow {
            box-shadow: 0 12px 32px -4px rgba(25, 28, 29, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar Shell Mapping -->
<header class="w-full top-0 sticky bg-[#f8f9fa] z-40 flex justify-between items-center px-8 py-4 w-full">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#1A365D] hover:bg-slate-200/50 p-2 rounded-full transition-colors">
                close
            </button>
<h1 class="font-headline text-xl font-bold text-[#002045] tracking-tight">The Digital Curator</h1>
</div>
<div class="flex items-center gap-4">
<div class="hidden md:flex gap-6 mr-6">
<span class="text-slate-500 font-medium hover:text-[#002045] cursor-pointer transition-colors">Collection</span>
<span class="text-slate-500 font-medium hover:text-[#002045] cursor-pointer transition-colors">Analytics</span>
</div>
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">
<img alt="Librarian Profile" data-alt="close up professional portrait of a librarian with neutral background and soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD3GS3OqmucpRJdxy1pSkf_yrO5rQGTJ_14TKIcTpPh-uC07PGxPvMuDApU0a7qNCb1Ea-2sUQWFWU09Tpx3s_7m-UtYHaneuCO0kYHMDmXJ6viKJ0wpYLR9Q9F4e4Gh2skf3xGwn6_gkHuvVj_-ijfJTKFbhbVf_11u-LWrOatYwcIiyGHqEq5VEX5h3uipwLwUScPOMVn5-Xn5evMdNdQ2o9HEZBKZmQJ5lqwl5mPW9AOegaW0m5Eh1czkICBH5Cf1CejE4F1cQ"/>
</div>
</div>
</header>
<main class="flex-grow flex items-start justify-center px-4 py-12">
<!-- Central Card Container -->
<div class="w-full max-w-4xl bg-surface-container-low rounded-xl scholarly-shadow overflow-hidden">
<div class="p-8 md:p-12">
<!-- Header Section -->
<div class="mb-12">
<h2 class="font-headline text-3xl font-extrabold text-primary tracking-tight mb-2">Add New Book</h2>
<p class="text-on-surface-variant font-label text-sm uppercase tracking-widest">Atelier Acquisitions Registry</p>
</div>
<!-- Form Section -->
<form class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
<!-- Book Title -->
<div class="md:col-span-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2 px-1">Book Title</label>
<input class="w-full bg-surface-container-high border-none border-b-2 border-primary rounded-lg focus:ring-0 focus:bg-surface-container-highest transition-colors py-4 px-5 text-on-surface placeholder:text-outline/50" placeholder="Enter full literary title" type="text"/>
</div>
<!-- Author(s) -->
<div class="md:col-span-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2 px-1">Author(s)</label>
<input class="w-full bg-surface-container-high border-none border-b-2 border-primary rounded-lg focus:ring-0 focus:bg-surface-container-highest transition-colors py-4 px-5 text-on-surface placeholder:text-outline/50" placeholder="e.g. Gabriel García Márquez, Isabel Allende" type="text"/>
</div>
<!-- Genre/Category -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2 px-1">Genre/Category</label>
<div class="relative">
<select class="appearance-none w-full bg-surface-container-high border-none border-b-2 border-primary rounded-lg focus:ring-0 focus:bg-surface-container-highest transition-colors py-4 px-5 pr-10 text-on-surface">
<option disabled="" selected="" value="">Choose a category</option>
<option>Literary Fiction</option>
<option>Historical Research</option>
<option>Philosophy</option>
<option>Poetry</option>
<option>Science &amp; Technology</option>
<option>Arts &amp; Atelier</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-primary">expand_more</span>
</div>
</div>
<!-- Language -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2 px-1">Language</label>
<div class="relative">
<select class="appearance-none w-full bg-surface-container-high border-none border-b-2 border-primary rounded-lg focus:ring-0 focus:bg-surface-container-highest transition-colors py-4 px-5 pr-10 text-on-surface">
<option disabled="" selected="" value="">Choose a Language</option>
<option>English</option>
<option>Urdu</option>
<option>Persian</option>
<option>Arabic</option>
<option>French</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-primary">language</span>
</div>
</div>
<!-- Total Copies -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2 px-1">Total Copies</label>
<input class="w-full bg-surface-container-high border-none border-b-2 border-primary rounded-lg focus:ring-0 focus:bg-surface-container-highest transition-colors py-4 px-5 text-on-surface" placeholder="0" type="number"/>
</div>
<!-- Price (PKR) -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2 px-1">Price (PKR)</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none border-b-2 border-primary rounded-lg focus:ring-0 focus:bg-surface-container-highest transition-colors py-4 px-5 text-on-surface" placeholder="0.00" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-bold text-outline">Rs.</span>
</div>
</div>
<!-- Total number of Pages -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2 px-1">Total number of Pages</label>
<input class="w-full bg-surface-container-high border-none border-b-2 border-primary rounded-lg focus:ring-0 focus:bg-surface-container-highest transition-colors py-4 px-5 text-on-surface" placeholder="Volume length" type="number"/>
</div>
<!-- Stock Status -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2 px-1">Stock Status</label>
<div class="flex flex-wrap gap-3 py-2">
<label class="flex items-center group cursor-pointer">
<input class="hidden peer" name="status" type="radio" value="available"/>
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-all text-sm font-medium">
                                    Available
                                </div>
</label>
<label class="flex items-center group cursor-pointer">
<input class="hidden peer" name="status" type="radio" value="reserved"/>
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant peer-checked:bg-secondary-container peer-checked:text-on-secondary-container peer-checked:border-secondary-container transition-all text-sm font-medium">
                                    Reserved
                                </div>
</label>
<label class="flex items-center group cursor-pointer">
<input class="hidden peer" name="status" type="radio" value="out"/>
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant peer-checked:bg-error-container peer-checked:text-on-error-container peer-checked:border-error-container transition-all text-sm font-medium">
                                    Out of stock
                                </div>
</label>
</div>
</div>
</form>
<!-- Action Buttons -->
<div class="mt-16 flex flex-col md:flex-row justify-end items-center gap-6">
<button class="w-full md:w-auto px-10 py-3 rounded-lg text-primary font-semibold hover:bg-surface-variant transition-colors border border-transparent">
                        Cancel
                    </button>
<button class="w-full md:w-auto px-12 py-3 rounded-lg bg-gradient-to-br from-primary to-primary-container text-white font-bold shadow-lg hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">library_add</span>
                        Add Book
                    </button>
</div>
</div>
<!-- Curated Visual Accent -->
<div class="h-1.5 w-full bg-gradient-to-r from-primary via-surface-tint to-primary"></div>
</div>
<!-- Decorative Background Element -->
<div class="fixed top-0 right-0 -z-10 opacity-10 pointer-events-none select-none overflow-hidden">
<span class="material-symbols-outlined text-[40rem] rotate-12" style="font-variation-settings: 'FILL' 0, 'wght' 100;">
                import_contacts
            </span>
</div>
</main>
<!-- Curator's Tray (Batch Processing Footer - Hidden for specific task but maintained for system alignment) -->
<footer class="mt-auto p-4 flex justify-center opacity-0 hover:opacity-100 transition-opacity">
<div class="bg-surface-container-lowest/80 backdrop-blur-xl px-6 py-3 rounded-full scholarly-shadow flex items-center gap-4">
<span class="text-xs font-label uppercase tracking-tighter text-on-surface-variant">Session Active</span>
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
</div>
</footer>
</body></html>
