<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>XLMS - Join the Collection</title>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#e7eeff",
              "surface-bright": "#f9f9ff",
              "on-secondary-fixed-variant": "#3c475a",

            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.75rem", "full": "9999px"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #002045 0%, #1a365d 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        input:focus + .input-border {
            width: 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center">
<div class="w-full max-w-md min-h-screen flex flex-col px-6 py-12 relative overflow-hidden">
<div class="absolute -top-24 -right-24 w-64 h-64 bg-surface-container-high rounded-full blur-3xl opacity-50"></div>
<div class="absolute top-1/2 -left-32 w-80 h-80 bg-primary-fixed-dim/20 rounded-full blur-3xl opacity-30"></div>
<header class="relative z-10 mb-12">
<div class="flex items-center justify-between mb-8">
<span class="text-2xl font-extrabold tracking-tighter text-primary font-headline">XLMS</span>
<span class="text-xs font-label uppercase tracking-widest text-secondary font-semibold bg-surface-container-high px-3 py-1 rounded-full">New Member</span>
</div>
<h1 class="text-4xl font-headline font-bold text-primary leading-tight tracking-tight mb-2">
                Begin Your <br/><span class="text-on-secondary-container">Curated Journey</span>
</h1>
<p class="text-on-surface-variant font-body text-sm leading-relaxed max-w-[280px]">
                Enter your credentials to access our prestigious digital archives and private collections.
            </p>
</header>
<form class="relative z-10 space-y-8 flex-grow">
<div class="relative">
<label class="block text-[11px] font-label font-bold uppercase tracking-widest text-on-secondary-fixed-variant mb-2 ml-1">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 font-body text-on-surface placeholder:text-outline/40 focus:ring-0 transition-all" placeholder="Theodore Vance" type="text"/>
<div class="input-border absolute bottom-0 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-primary transition-all duration-300"></div>
</div>
</div>
<div class="relative">
<label class="block text-[11px] font-label font-bold uppercase tracking-widest text-on-secondary-fixed-variant mb-2 ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 font-body text-on-surface placeholder:text-outline/40 focus:ring-0 transition-all" placeholder="vance@university.edu" type="email"/>
<div class="input-border absolute bottom-0 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-primary transition-all duration-300"></div>
</div>
</div>
<div class="relative">
<label class="block text-[11px] font-label font-bold uppercase tracking-widest text-on-secondary-fixed-variant mb-2 ml-1">Create Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 font-body text-on-surface placeholder:text-outline/40 focus:ring-0 transition-all" placeholder="••••••••" type="password"/>
<div class="input-border absolute bottom-0 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-primary transition-all duration-300"></div>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-start space-x-3 px-1 pt-2">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded-lg border-2 border-surface-container-high text-primary focus:ring-primary/20 bg-surface-container-lowest transition-all" id="terms" type="checkbox"/>
</div>
<label class="text-xs font-body text-on-surface-variant leading-relaxed" for="terms">
                    I acknowledge and agree to the <span class="text-primary font-semibold underline decoration-primary-fixed-dim underline-offset-4 cursor-pointer">Terms of Service</span> and institutional guidelines.
                </label>
</div>
<button class="signature-gradient w-full py-5 rounded-xl text-on-primary font-headline font-bold text-lg shadow-xl shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center space-x-2 group" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
</button>
</form>
<footer class="relative z-10 mt-12 pb-8 flex flex-col items-center">
<p class="text-sm font-body text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold ml-1 hover:underline underline-offset-4" href="#">Login</a>
</p>
<div class="mt-12 flex items-center space-x-6">
<div class="h-[1px] w-12 bg-surface-container-high"></div>
<div class="flex space-x-3">
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-high"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-high"></div>
</div>
<div class="h-[1px] w-12 bg-surface-container-high"></div>
</div>
</footer>
<div class="absolute bottom-0 right-0 w-48 h-48 pointer-events-none opacity-5 grayscale group-hover:grayscale-0 transition-all duration-1000">
<img alt="Library architecture" class="w-full h-full object-cover rounded-tl-[4rem]" data-alt="Monochrome close-up of classical library wooden shelves and book spines in soft atmospheric lighting with deep shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUciJ4_yGMJtFHUvE5Ez-hX0jYlUt7BMhi3h2dstzzJn6ur_CGsszVOUDDnjlA4FX4TXRAvhCFkPVNqr4sctREf1BYy7OnSeGqoAslOcwjNLmvVwgRywzH9BeoMXIE0aQv5f3_7BAtOFuLXVOcZcA84l01HgOXr4F9DImDzRVZDLQLpodkujQVLq_iCEZfM3sG-ZMemkpg0PD4HRcSuHa5slbfxNO4ovN8G5OrSFSadhniftYksptylTUfeS0xFJf8IUENaPBv1NM"/>
</div>
</div>
</body></html>
