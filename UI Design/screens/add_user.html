<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add User | XLMS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#c6955e",
                    "tertiary-container": "#4f2e00",
                    "error": "#ba1a1a",
                    "secondary-container": "#d9e3f8",
                    "on-surface-variant": "#43474e",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e1e3e4",
                    "surface-variant": "#e1e3e4",
                    "on-tertiary-fixed": "#2b1700",
                    "surface-bright": "#f8f9fa",
                    "outline-variant": "#c4c6cf",
                    "surface-container-high": "#e7e8e9",
                    "on-tertiary-fixed-variant": "#633f0f",
                    "secondary": "#555f70",
                    "inverse-surface": "#2e3132",
                    "surface-container-low": "#f3f4f5",
                    "secondary-fixed": "#d9e3f8",
                    "on-background": "#191c1d",
                    "on-secondary-container": "#5b6577",
                    "surface-container": "#edeeef",
                    "on-primary-container": "#86a0cd",
                    "background": "#f8f9fa",
                    "primary": "#002045",
                    "primary-fixed-dim": "#adc7f7",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#f0f1f2",
                    "inverse-primary": "#adc7f7",
                    "on-secondary-fixed": "#121c2b",
                    "outline": "#74777f",
                    "on-tertiary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#3e4758",
                    "tertiary-fixed": "#ffddba",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#bdc7db",
                    "on-surface": "#191c1d",
                    "tertiary-fixed-dim": "#f2bc82",
                    "surface-dim": "#d9dadb",
                    "on-error": "#ffffff",
                    "tertiary": "#321b00",
                    "surface": "#f8f9fa",
                    "on-primary-fixed-variant": "#2d476f",
                    "surface-tint": "#455f88",
                    "primary-container": "#1a365d",
                    "primary-fixed": "#d6e3ff",
                    "on-primary-fixed": "#001b3c"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-[#f8f9fa] dark:bg-slate-900 sticky top-0 z-50">
<div class="flex items-center px-6 py-4 w-full max-w-screen-xl mx-auto">
<button class="mr-4 text-[#1A365D] dark:text-blue-400 active:scale-95 duration-150 hover:bg-[#e7e8e9] dark:hover:bg-slate-800 transition-colors p-2 rounded-xl">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg text-[#1A365D] dark:text-blue-400">Manage Users</h1>
</div>
</header>
<main class="max-w-4xl mx-auto px-6 pt-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Title & Editorial Intro -->
<div class="mb-16">
<span class="text-on-tertiary-container font-semibold tracking-widest text-[10px] uppercase mb-2 block">Curator Portal</span>
<h2 class="text-4xl md:text-5xl font-extrabold text-primary tracking-tight mb-4">Add User</h2>
<p class="text-on-surface-variant max-w-lg leading-relaxed">Register a new member into the digital archives. Ensure all scholarly credentials and access levels are accurately cataloged.</p>
</div>
<!-- Form Container using Surface Tonal Shifts -->
<div class="bg-surface-container-low rounded-xl p-8 md:p-12">
<section class="mb-12">
<h3 class="headline text-xl font-bold text-primary mb-8 flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container">person_add</span>
                    User Information
                </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
<!-- User Name -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1" for="user-name">User Name</label>
<input class="bg-surface-container-high border-none rounded-sm border-b-2 border-primary focus:ring-0 focus:bg-surface-container-highest transition-colors px-4 py-3 placeholder:text-outline" id="user-name" placeholder="Enter full name" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1" for="email">Email</label>
<input class="bg-surface-container-high border-none rounded-sm border-b-2 border-primary focus:ring-0 focus:bg-surface-container-highest transition-colors px-4 py-3 placeholder:text-outline" id="email" placeholder="institutional@xlms.edu" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-2 md:col-span-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1" for="password">Temporary Password</label>
<input class="bg-surface-container-high border-none rounded-sm border-b-2 border-primary focus:ring-0 focus:bg-surface-container-highest transition-colors px-4 py-3 placeholder:text-outline" id="password" placeholder="••••••••••••" type="password"/>
</div>
<!-- Membership Type -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1" for="membership-type">Membership Type</label>
<select class="bg-surface-container-high border-none rounded-sm border-b-2 border-primary focus:ring-0 focus:bg-surface-container-highest transition-colors px-4 py-3 appearance-none" id="membership-type">
<option>Standard Academic</option>
<option>Research Fellow</option>
<option>Visiting Scholar</option>
<option>Emeritus</option>
</select>
</div>
<!-- Membership Tier -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1" for="membership">Membership</label>
<select class="bg-surface-container-high border-none rounded-sm border-b-2 border-primary focus:ring-0 focus:bg-surface-container-highest transition-colors px-4 py-3 appearance-none" id="membership">
<option>Annual Subscription</option>
<option>Institutional Grant</option>
<option>Lifetime Access</option>
</select>
</div>
</div>
</section>
<!-- Role Selection (Asymmetric Layout) -->
<section class="mb-12">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1 mb-4 block">Assign System Role</label>
<div class="flex flex-col sm:flex-row gap-4">
<!-- Role: User -->
<label class="flex-1 cursor-pointer group">
<input checked="" class="hidden peer" name="role" type="radio" value="user"/>
<div class="p-6 bg-surface-container-lowest rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-secondary-container transition-all flex items-start gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">person</span>
</div>
<div>
<span class="font-bold text-primary block">User</span>
<span class="text-sm text-on-secondary-container">Standard access to archives and personal collections.</span>
</div>
</div>
</label>
<!-- Role: Admin -->
<label class="flex-1 cursor-pointer group">
<input class="hidden peer" name="role" type="radio" value="admin"/>
<div class="p-6 bg-surface-container-lowest rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-secondary-container transition-all flex items-start gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">verified_user</span>
</div>
<div>
<span class="font-bold text-primary block">Admin</span>
<span class="text-sm text-on-secondary-container">Full administrative rights and collection management.</span>
</div>
</div>
</label>
</div>
</section>
<!-- Action Cluster -->
<div class="flex flex-col-reverse sm:flex-row items-center justify-end gap-4 pt-8 mt-8 border-t border-outline-variant/15">
<button class="w-full sm:w-auto px-8 py-3.5 text-on-secondary-container font-semibold hover:bg-surface-variant transition-colors rounded-xl active:scale-95 duration-150">
                    Cancel
                </button>
<button class="w-full sm:w-auto px-10 py-3.5 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-xl shadow-lg active:scale-95 transition-all duration-150 hover:brightness-110">
                    Create User
                </button>
</div>
</div>
<!-- Decorative Element -->
<div class="mt-20 flex justify-center">
<div class="w-32 h-1 bg-surface-container-highest rounded-full"></div>
</div>
</main>
<!-- Navigation Shell (BottomNavBar for Mobile as per prompt guidelines) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl border-t border-slate-200/15 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] rounded-t-xl px-4 py-2 pb-safe flex justify-around items-center">
<div class="flex flex-col items-center justify-center text-[#191c1d] dark:text-slate-400 py-1.5 px-4 hover:bg-[#f3f4f5] dark:hover:bg-slate-800 rounded-xl transition-all active:scale-90">
<span class="material-symbols-outlined text-[24px]">library_books</span>
<span class="font-inter text-[11px] font-semibold mt-1">Catalog</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#1A365D] text-white rounded-xl py-1.5 px-4 transition-all active:scale-90">
<span class="material-symbols-outlined text-[24px]">group</span>
<span class="font-inter text-[11px] font-semibold mt-1">Members</span>
</div>
<div class="flex flex-col items-center justify-center text-[#191c1d] dark:text-slate-400 py-1.5 px-4 hover:bg-[#f3f4f5] dark:hover:bg-slate-800 rounded-xl transition-all active:scale-90">
<span class="material-symbols-outlined text-[24px]">settings</span>
<span class="font-inter text-[11px] font-semibold mt-1">Settings</span>
</div>
</nav>
<!-- Side Decoration (Desktop only asymmetry) -->
<aside class="hidden xl:block fixed left-12 top-1/2 -translate-y-1/2 w-48 opacity-20 select-none pointer-events-none">
<div class="space-y-4">
<div class="h-1 bg-primary w-full"></div>
<div class="h-1 bg-primary w-2/3"></div>
<div class="h-1 bg-primary w-1/2"></div>
<p class="text-[10px] font-bold text-primary vertical-rl rotate-180 py-4 uppercase tracking-[0.5em]">Academic Management</p>
</div>
</aside>
</body></html>
