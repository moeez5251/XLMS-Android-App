<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>XLMS - Library Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Work+Sans:wght@400;500&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#e7eeff",
              "surface-bright": "#f9f9ff",
              "on-secondary-fixed-variant": "#3c475a",
              "on-error-container": "#93000a",
              "surface": "#f9f9ff",
              "secondary": "#545f72",
              "tertiary-fixed-dim": "#f2bc82",
              "on-error": "#ffffff",
              "primary-fixed-dim": "#adc7f7",
              "error": "#ba1a1a",
              "on-surface": "#121c2c",
              "secondary-fixed-dim": "#bcc7dd",
              "secondary-fixed": "#d8e3fa",
              "inverse-surface": "#273141",
              "on-secondary-container": "#586377",
              "inverse-on-surface": "#ebf1ff",
              "on-primary-fixed-variant": "#2d476f",
              "inverse-primary": "#adc7f7",
              "on-tertiary-fixed-variant": "#633f0f",
              "on-tertiary-container": "#c6955e",
              "error-container": "#ffdad6",
              "on-primary": "#ffffff",
              "tertiary": "#321b00",
              "surface-container-lowest": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#43474e",
              "outline": "#74777f",
              "surface-container-low": "#f0f3ff",
              "primary-container": "#1a365d",
              "outline-variant": "#c4c6cf",
              "background": "#f9f9ff",
              "on-primary-container": "#86a0cd",
              "surface-container-high": "#dee8ff",
              "on-tertiary-fixed": "#2b1700",
              "tertiary-fixed": "#ffddba",
              "on-secondary": "#ffffff",
              "primary-fixed": "#d6e3ff",
              "on-background": "#121c2c",
              "surface-tint": "#455f88",
              "surface-variant": "#d9e3f9",
              "surface-dim": "#d0daf0",
              "tertiary-container": "#4f2e00",
              "on-primary-fixed": "#001b3c",
              "primary": "#002045",
              "on-secondary-fixed": "#111c2c",
              "secondary-container": "#d5e0f7",
              "surface-container-highest": "#d9e3f9"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Work Sans"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .signature-gradient {
        background: linear-gradient(135deg, #002045 0%, #1a365d 100%);
      }
      .input-underline::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 0;
        height: 2px;
        background-color: #002045;
        transition: all 0.3s ease;
        transform: translateX(-50%);
      }
      .input-underline:focus-within::after {
        width: 100%;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center">
<!-- Hero Aesthetic Section -->
<div class="w-full h-[265px] relative overflow-hidden flex items-center justify-center">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-10" data-alt="Modern minimalist library interior with towering bookshelves and soft atmospheric sunlight filtering through high windows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhvImrZj3FQRZOUYcxQ6JqMDqA4itq35eEE41RWjqGMcyL_lSJsZwHyYXuEmJav4dAMI6HdJKgw1wpQRCsHOLkuev6ORyUpev-xX2xouc-hvz9B6S3WhN0vZG79tXnC6bcZ2amBiqh7SJIYzu2Q8dG4V624LXZsPH4zQB02IC48fE0LdTJyFOtgZj4IU0J2peFXxNj8h-drHybxyA4QdIh-DeoIbAzoI6HMScpGKzmMiSu2fW-1K1UjQ3z-atOOKgDA01zNBpCqtI"/>
<div class="absolute inset-0 bg-gradient-to-b from-surface/0 via-surface/50 to-surface"></div>
</div>
<!-- Large Branding Logo -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-16 h-16 signature-gradient rounded-full flex items-center justify-center mb-4 shadow-xl">
<span class="material-symbols-outlined text-on-primary text-3xl">auto_stories</span>
</div>
<h1 class="font-headline text-5xl font-extrabold tracking-tighter text-primary">XLMS</h1>
<p class="font-label text-xs uppercase tracking-[0.3em] text-on-secondary-container mt-2 opacity-70">The Digital Curator</p>
</div>
</div>
<!-- Login Form Container -->
<main class="w-full max-w-md px-8 pb-12 flex-1 flex flex-col">
<div class="mb-10 text-center">
<h2 class="font-headline text-2xl font-bold text-on-surface">Welcome Back</h2>
<p class="text-on-surface-variant text-sm mt-1">Access your scholarly collection</p>
</div>
<form class="space-y-8">
<!-- Library Card Number Field -->
<div class="relative group">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-primary mb-2 block">Library Card Number</label>
<div class="relative input-underline">
<span class="absolute left-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">id_card</span>
<input class="w-full bg-surface-container-low border-none rounded-t-lg pl-10 pr-4 py-4 focus:ring-0 text-on-surface font-body placeholder:text-on-surface-variant/40" placeholder="000 000 000" type="text"/>
</div>
</div>
<!-- PIN/Password Field -->
<div class="relative group">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-primary mb-2 block">PIN/Password</label>
<div class="relative input-underline">
<span class="absolute left-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">lock_open</span>
<input class="w-full bg-surface-container-low border-none rounded-t-lg pl-10 pr-12 py-4 focus:ring-0 text-on-surface font-body placeholder:text-on-surface-variant/40" placeholder="••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot PIN -->
<div class="flex items-center justify-between">
<label class="flex items-center cursor-pointer group">
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-surface-container-high rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:bg-on-primary peer-checked:bg-primary"></div>
</div>
<span class="ml-3 font-label text-xs font-medium text-on-secondary-fixed-variant group-hover:text-primary transition-colors">Remember Me</span>
</label>
<a class="font-label text-xs font-semibold text-primary hover:underline decoration-2 underline-offset-4" href="#">Forgot PIN?</a>
</div>
<!-- Login Button -->
<button class="w-full signature-gradient text-on-primary py-4 rounded-xl font-headline font-bold text-lg shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
                Login
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Sign Up Link -->
<div class="mt-auto pt-12 text-center">
<p class="font-body text-sm text-on-surface-variant">
                New Member? 
                <a class="text-primary font-bold ml-1 hover:underline decoration-2 underline-offset-4" href="#">Sign Up</a>
</p>
</div>
</main>
<!-- Subtle Decorative Background Element -->
<div class="fixed -bottom-24 -right-24 w-64 h-64 bg-primary-fixed-dim/20 rounded-full blur-[80px] pointer-events-none"></div>
<div class="fixed -top-24 -left-24 w-64 h-64 bg-tertiary-fixed-dim/10 rounded-full blur-[80px] pointer-events-none"></div>
</body></html>
